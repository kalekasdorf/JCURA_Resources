<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCURA Poster Resources</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #f0f2f5;
    color: #1a1a1a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 32px 16px;
  }

  .card {
    background: white;
    border-radius: 14px;
    padding: 40px 36px;
    max-width: 540px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.07);
  }

  .tag {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #3b6fd4;
    background: #eef2fc;
    padding: 4px 10px;
    border-radius: 20px;
    margin-bottom: 14px;
  }

  h1 {
    font-size: 1.45rem;
    font-weight: 600;
    margin-bottom: 8px;
    color: #111;
  }

  .subtitle {
    font-size: 14px;
    color: #777;
    font-weight: 400;
    line-height: 1.6;
    margin-bottom: 30px;
  }

  .divider {
    border: none;
    border-top: 1px solid #ebebeb;
    margin-bottom: 24px;
  }

  a.resource {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 18px;
    border: 1px solid #e8e8e8;
    border-radius: 9px;
    text-decoration: none;
    color: #1a1a1a;
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 10px;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
  }
  a.resource:last-child { margin-bottom: 0; }
  a.resource:hover {
    background: #f7f9ff;
    border-color: #b0c0ea;
    box-shadow: 0 2px 10px rgba(59, 111, 212, 0.08);
  }

  .arrow {
    color: #bbb;
    font-size: 15px;
    flex-shrink: 0;
    margin-left: 12px;
    transition: color 0.15s, transform 0.15s;
  }
  a.resource:hover .arrow {
    color: #3b6fd4;
    transform: translateX(2px);
  }
</style>
</head>
<body>
<div class="card">
  <span class="tag">JCURA Research</span>
  <h1>Poster Resources</h1>
  <p class="subtitle">Additional materials and datasets referenced in this project.</p>
  <hr class="divider">

  <a class="resource" href="https://physionet.org/content/eicu-crd-demo/2.0.1/">
    eICU Collaborative Research Database Demo
    <span class="arrow">→</span>
  </a>
  <a class="resource" href="https://eicu-crd.mit.edu/about/eicu/">
    eICU Data Dictionary
    <span class="arrow">→</span>
  </a>
  <a class="resource" href="eICU_ERD.svg">
    eICU Entity-Relationship Diagram
    <span class="arrow">→</span>
  </a>
</div>
</body>
</html>
